          { text: "特色", pinyin: "tè sè" }, { text: "餐馆", pinyin: "cān guǎn" }, { text: "应有尽有", pinyin: "yīng yǒu jìn yǒu" }, { text: "。", pinyin: "" },
          { text: "在这里", pinyin: "zài zhè lǐ" }, { text: "，", pinyin: "" }, { text: "你", pinyin: "nǐ" }, { text: "可以", pinyin: "kě yǐ" }, { text: "吃到", pinyin: "chī dào" }, { text: "世界各地", pinyin: "shì jiè gè dì" }, { text: "的", pinyin: "de" }, { text: "美食", pinyin: "měi shí" }, { text: "，", pinyin: "" },
          { text: "有的", pinyin: "yǒu de" }, { text: "甚至", pinyin: "shèn zhì" }, { text: "本地", pinyin: "běn dì" }, { text: "难得一见", pinyin: "nán dé yī jiàn" }, { text: "的", pinyin: "de" }, { text: "。", pinyin: "" }
        ],
        quiz: {
          question: "星耀樟宜有______多家商店。",
          answer: "200"
        },
        skill: {
          content: [
            { text: "其中", pinyin: "qí zhōng" }, { text: "不少", pinyin: "bù shǎo" }, { text: "和", pinyin: "hé" }, { text: "“", pinyin: "" }, { text: "吃", pinyin: "chī" }, { text: "”", pinyin: "" }, { text: "有关", pinyin: "yǒu guān" }, { text: "，", pinyin: "" },
            { text: "零食店", pinyin: "líng shí diàn" }, { text: "、", pinyin: "" }, 
            { text: "甜品店", pinyin: "tián pǐn diàn" }, { text: "、", pinyin: "" }, 
            { text: "饮料店", pinyin: "yǐn liào diàn" }, { text: "和", pinyin: "hé" }, 
            { text: "特色", pinyin: "tè sè" }, { text: "餐馆", pinyin: "cān guǎn" }, { text: "应有尽有", pinyin: "yīng yǒu jìn yǒu" }, { text: "。", pinyin: "" }
          ],
          answer: "举例子"
        }
      }
    ];

    function App() {
      const [currentSection, setCurrentSection] = useState(null);
      const [selectedWord, setSelectedWord] = useState(null);
      const [errorMessage, setErrorMessage] = useState("");
      
      const [showQuiz, setShowQuiz] = useState(false);
      const [quizInput, setQuizInput] = useState("");
      const [quizError, setQuizError] = useState(false);

      const [viewState, setViewState] = useState('content'); // 'content', 'skill', 或 'completion'
      const [skillAnswered, setSkillAnswered] = useState(false);
      const [skillError, setSkillError] = useState(false);

      const [completedSections, setCompletedSections] = useState([]);
      const [clickedWords, setClickedWords] = useState([]);

      const openSection = (section) => {
        setCurrentSection(section);
        setViewState('content');
        setSkillAnswered(false);
        setSkillError(false);
        setClickedWords([]); // 进入新板块时，重置专属词语本
      };

      const showError = (msg) => {
        setErrorMessage(msg);
        setTimeout(() => setErrorMessage(""), 4000);
      };

      const handleBackClick = () => {
        if (currentSection && currentSection.quiz) {
          setShowQuiz(true);
          setQuizInput("");
          setQuizError(false);
        } else {
          setCurrentSection(null);
        }
      };

      const handleQuizSubmit = () => {
        if (!quizInput.trim()) return;
        
        let isCorrect = false;
        const expected = currentSection.quiz.answer;
        
        if (Array.isArray(expected)) {
          isCorrect = expected.every(keyword => quizInput.includes(keyword));
        } else {
          isCorrect = quizInput.trim() === expected;
        }
        
        if (isCorrect) {
          setShowQuiz(false);
          setCompletedSections(prev => {
            if (!prev.includes(currentSection.id)) {
              return [...prev, currentSection.id];
            }
            return prev;
          });
          setViewState('completion'); // 答对后，进入专属的完成页面
        } else {
          setQuizError(true);
        }
      };

      const handleQuizKeyPress = (e) => {
        if (e.key === 'Enter') {
          handleQuizSubmit();
        }
      };

      const renderWord = (item, index) => {
        // 判断是否为纯标点符号（标点符号不生成点击事件）
        const isPunctuation = /^[，。“”、；！？]+$/.test(item.text);
        
        // 核心匹配逻辑：优先使用完全相等匹配，防止长词被短词覆盖；如果没有，再看词典中是否包含该项
        let foundWordKey = null;
        if (!isPunctuation) {
          if (VOCABULARY[item.text]) {
            foundWordKey = item.text;
          } else {
            foundWordKey = Object.keys(VOCABULARY).find(v => item.text.includes(v));
          }
        }

        const isClickable = !!foundWordKey;
        const wordData = foundWordKey ? VOCABULARY[foundWordKey] : null;

        const handleWordClick = () => {
          if (isClickable) {
            setSelectedWord({ name: foundWordKey, ...wordData });
            setClickedWords(prev => {
              if (!prev.includes(foundWordKey)) return [...prev, foundWordKey];
              return prev;
            });
          }
        };

        if (wordData && wordData.icon) {
          return (
            <div 
              key={index} 
              className="inline-flex flex-col items-center mx-2 mb-4 cursor-pointer hover:scale-105 transition-transform bg-white rounded-2xl p-3 shadow-sm border border-slate-100"
              onClick={handleWordClick}
            >
              <div className="text-4xl mb-1">{wordData.icon}</div>
              <span className="text-[10px] text-slate-400 font-mono h-4 leading-none select-none">
                {item.pinyin}
              </span>
              <span className="text-xl font-bold text-blue-600 border-b-2 border-blue-200">
                {item.text}
              </span>
              <span className="text-[10px] text-slate-400 mt-1 uppercase font-black">{wordData.english}</span>
            </div>
          );
        }

        return (
          <div 
            key={index} 
            className={`inline-flex flex-col items-center mx-0.5 mb-2 group transition-transform ${isClickable ? 'cursor-pointer hover:scale-105' : ''}`}
            onClick={handleWordClick}
          >
            <span className="text-[10px] text-slate-400 font-mono h-4 leading-none select-none">
              {item.pinyin}
            </span>
            <span className={`text-xl font-medium ${isClickable ? 'text-blue-600 border-b-2 border-blue-200' : 'text-slate-800'}`}>
              {item.text}
            </span>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-20">
          <header className="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
            <div className="flex items-center gap-2">
              <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold text-xl">星</div>
              <h1 className="text-xl font-bold text-slate-700">中一G2单元三核心</h1>
            </div>
            <div className="flex items-center gap-3">
              <div className="hidden md:flex items-center gap-1 text-slate-400 bg-slate-100 px-3 py-1 rounded-full text-xs">
                <Users className="w-3 h-3" />
                <span>小组合作模式</span>
              </div>
              <div className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-bold uppercase tracking-tight">单元三 核心</div>
            </div>
          </header>

          {errorMessage && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-red-50 text-red-600 border border-red-200 px-6 py-3 rounded-full flex items-center gap-2 z-50 shadow-lg animate-in slide-in-from-top fade-in duration-300">
              <AlertCircle className="w-5 h-5" />
              <span className="font-bold text-sm">{errorMessage}</span>
            </div>
          )}

          {!currentSection ? (
            <main className="p-6 max-w-5xl mx-auto space-y-8 animate-in fade-in duration-700">
              <section className="relative h-80 rounded-[3rem] overflow-hidden shadow-xl border-4 border-white bg-gradient-to-br from-emerald-400 to-teal-600 flex flex-col justify-end p-10">
                <h2 className="text-white text-4xl font-black mb-2 drop-shadow-md">单元三 核心</h2>
                <p className="text-emerald-100 text-3xl font-bold drop-shadow-sm">《迷人的星耀樟宜》</p>
                <p className="text-white/80 mt-2 font-medium">请找到你的编号，点击进入学习任务区 👇</p>
              </section>

              <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                {SECTIONS.map((section) => {
                  const isCompleted = completedSections.includes(section.id);
                  return (
                    <button
                      key={section.id}
                      onClick={() => openSection(section)}
                      className={`${isCompleted ? 'bg-slate-300' : section.color} hover:brightness-110 active:scale-95 transition-all text-white p-5 rounded-[2.5rem] shadow-lg flex flex-col items-center gap-3 border-b-8 border-black/20 relative group`}
                    >
                      {isCompleted && (
                        <div className="absolute top-2 left-2 bg-emerald-500 text-white rounded-full p-1 shadow-sm">
                          <Check className="w-5 h-5" />
                        </div>
                      )}
                      <div className="absolute -top-3 -right-3 bg-yellow-400 text-slate-900 text-xs font-black px-3 py-1 rounded-full shadow-md z-10 border-2 border-white ring-2 ring-yellow-400/20">
                        {section.member}
                      </div>
                      <div className={`${isCompleted ? 'bg-slate-400/50' : 'bg-white/20'} p-4 rounded-2xl group-hover:bg-white/30 transition-colors`}>
                        {section.icon}
                      </div>
                      <span className="font-bold text-lg">{section.title}</span>
                    </button>
                  );
                })}
              </div>

              <div className="bg-yellow-50 border-2 border-yellow-200 rounded-3xl p-6 flex items-start gap-4 shadow-sm">
                <div className="bg-yellow-400 p-2 rounded-xl text-white">
                  <Users className="w-6 h-6" />
                </div>
                <div>
                  <h3 className="font-black text-slate-800 mb-1 italic">小组任务 (Group Mission)</h3>
                  <p className="text-slate-600 text-sm leading-relaxed">
                    1. 确认你的编号 (1-4)。<br/>
                    2. 进入对应区域，练习朗读并掌握重点词汇。<br/>
                    3. 完成后，回到小组向其他成员分享你学习的内容！
                  </p>
                </div>
              </div>
            </main>
          ) : (
            <main className="p-4 max-w-3xl mx-auto animate-in slide-in-from-bottom-4 duration-500">
              {viewState !== 'completion' && (
                <button onClick={handleBackClick} className="mb-6 flex items-center gap-2 text-slate-500 hover:text-emerald-600 font-bold bg-white px-4 py-2 rounded-full shadow-sm w-fit border border-slate-100 transition-colors">
                  <ChevronRight className="w-5 h-5 rotate-180" /> 返回主页
                </button>
              )}

              {viewState === 'completion' ? (
                <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border-8 border-emerald-400 text-center animate-in zoom-in duration-500">
                  <div className="bg-emerald-500 p-12 text-white relative">
                    <h2 className="text-5xl font-black mb-4 drop-shadow-md">🏆 很好！完成了！</h2>
                    <p className="text-2xl font-bold text-emerald-100">恭喜你闯关成功，组员（{currentSection.member}）已完成学习自己的部分！</p>
                  </div>
                  
                  <div className="p-10 md:p-14">
                    <div className="inline-flex items-center gap-2 bg-yellow-100 text-yellow-700 px-6 py-2 rounded-full font-black text-xl mb-8">
                      <span>📖 你的专属词语本</span>
                    </div>
                    
                    {clickedWords.length === 0 ? (
                      <p className="text-slate-500 font-medium text-lg">你太厉害了，一个词语都没点就过关了！</p>
                    ) : (
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {clickedWords.map((word, idx) => {
                          const data = VOCABULARY[word];
                          return (
                            <div key={idx} className="bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl flex flex-col items-center hover:border-emerald-300 hover:bg-emerald-50 transition-colors cursor-pointer" onClick={() => setSelectedWord({ name: word, ...data })}>
                              <span className="text-emerald-500 font-mono text-xs font-black mb-1 tracking-widest uppercase">{data.pinyin}</span>
                              <span className="text-xl font-black text-slate-800">{word}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                  
                  <div className="p-8 bg-slate-50 flex justify-center gap-4">
                    <button onClick={() => window.print()} className="bg-slate-800 text-white font-bold text-lg px-8 py-4 rounded-2xl shadow-lg hover:bg-slate-900 active:scale-95 transition-all">
                      🖨️ 打印词语本
                    </button>
                    <button onClick={() => setCurrentSection(null)} className="bg-white text-slate-600 font-bold text-lg px-8 py-4 rounded-2xl shadow-sm border-2 border-slate-200 hover:bg-slate-100 active:scale-95 transition-all">
                      返回主页
                    </button>
                  </div>
                </div>
              ) : (
                <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100">
                  <div className={`${currentSection.color} p-8 text-white flex justify-between items-center relative`}>
                    <div className="flex flex-col">
                      <span className="text-white/60 font-black text-xs uppercase tracking-widest mb-1 italic">
                        任务区 · {currentSection.member} {viewState === 'skill' && '· 写作技能'}
                      </span>
                      <h2 className="text-3xl font-black">{currentSection.title}</h2>
                    </div>
                  </div>
                  
                  {viewState === 'content' ? (
                    <div className="p-8 md:p-12">
                      <div className="flex flex-wrap items-end leading-[3.8rem]">
                        {currentSection.content.map((item, index) => renderWord(item, index))}
                      </div>
                      
                      {currentSection.skill && (
                        <div className="mt-12 flex justify-end border-t border-slate-100 pt-8">
                          <button 
                            onClick={() => setViewState('skill')}
                            className="bg-emerald-500 text-white font-bold text-lg px-8 py-4 rounded-2xl shadow-lg hover:bg-emerald-600 hover:-translate-y-1 active:translate-y-0 transition-all flex items-center gap-2"
                          >
                            下一步：写作技能 <ChevronRight className="w-6 h-6" />
                          </button>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="p-8 md:p-12 bg-slate-50">
                      <h3 className="text-2xl font-black mb-6 text-slate-800">✍️ 说明方法小锦囊</h3>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div className="bg-white p-6 rounded-2xl border-2 border-blue-200 shadow-sm">
                          <h4 className="font-black text-blue-600 text-xl mb-4 flex items-center gap-2">
                            🔢 <span className="cursor-pointer hover:underline" onClick={() => setSelectedWord({name: '列数字', ...VOCABULARY['列数字']})}>列数字</span>
                          </h4>
                          <div className="flex flex-wrap items-end leading-[3rem]">
                            {SKILL_EXPLANATIONS["列数字"].map((item, index) => renderWord(item, index))}
                          </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border-2 border-purple-200 shadow-sm">
                          <h4 className="font-black text-purple-600 text-xl mb-4 flex items-center gap-2">
                            🍎 <span className="cursor-pointer hover:underline" onClick={() => setSelectedWord({name: '举例子', ...VOCABULARY['举例子']})}>举例子</span>
                          </h4>
                          <div className="flex flex-wrap items-end leading-[3rem]">
                            {SKILL_EXPLANATIONS["举例子"].map((item, index) => renderWord(item, index))}
                          </div>
                        </div>
                      </div>

                      <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                        <p className="text-slate-800 font-bold text-lg mb-4">想一想，你在课文里读到的这句话，使用了哪种说明方法？</p>
                        <div className="bg-slate-50 border-l-4 border-emerald-500 p-4 px-6 rounded-r-xl mb-6">
                          <div className="flex flex-wrap items-end leading-[3.8rem]">
                            {currentSection.skill.content.map((item, index) => renderWord(item, index))}
                          </div>
                        </div>
                        
                        <div className="flex gap-4">
                          {['列数字', '举例子'].map(option => (
                            <button 
                              key={option}
                              onClick={() => {
                                if (option === currentSection.skill.answer) {
                                  setSkillAnswered(true);
                                  setSkillError(false);
                                } else {
                                  setSkillError(true);
                                  setSkillAnswered(false);
                                }
                              }}
                              disabled={skillAnswered}
                              className={`flex-1 py-4 rounded-2xl font-black text-xl transition-all border-2 ${
                                skillAnswered 
                                  ? (option === currentSection.skill.answer ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-slate-100 text-slate-400 border-slate-200 opacity-50')
                                  : 'bg-white text-slate-700 border-slate-200 hover:border-emerald-400 hover:bg-emerald-50'
                              }`}
                            >
                              {option}
                            </button>
                          ))}
                        </div>

                        {skillError && !skillAnswered && (
                          <p className="text-red-500 font-bold mt-4 animate-in slide-in-from-top-2 flex items-center gap-2">
                            <X className="w-5 h-5" /> 哎呀，不对哦！再仔细看看上面的解释吧。
                          </p>
                        )}

                        {skillAnswered && (
                          <div className="mt-8 pt-6 border-t border-slate-100 animate-in fade-in flex flex-col items-center gap-4">
                            <p className="text-emerald-600 font-black text-xl">🎉 答对啦！你真棒！</p>
                            <button 
                              onClick={handleBackClick}
                              className="bg-yellow-400 text-slate-900 font-black text-lg px-10 py-4 rounded-2xl shadow-lg hover:bg-yellow-500 hover:-translate-y-1 active:translate-y-0 transition-all"
                            >
                              进行过关小测验
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </main>
          )}

          {/* 词汇弹窗解析 */}
          {selectedWord && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-[2.5rem] w-full max-sm:max-w-xs max-w-sm overflow-hidden shadow-2xl transform animate-in zoom-in duration-200 border-4 border-white">
                <div className="bg-gradient-to-r from-blue-600 to-blue-400 p-8 text-white relative flex flex-col items-center text-center">
                  {selectedWord.icon && <div className="text-7xl mb-4 bg-white/20 w-24 h-24 rounded-full flex items-center justify-center shadow-inner">{selectedWord.icon}</div>}
                  <h4 className="text-4xl font-black mb-1">{selectedWord.name}</h4>
                  <p className="text-blue-100 font-mono text-xl">{selectedWord.pinyin}</p>
                  <button onClick={() => setSelectedWord(null)} className="absolute top-4 right-4 bg-white/20 p-2 rounded-full hover:bg-white/40 transition-colors">
                    <X className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-8 space-y-6">
                  <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <p className="text-blue-400 text-[10px] font-black uppercase tracking-widest mb-1">意思 (Easy Chinese)</p>
                    <p className="text-slate-700 text-2xl font-bold">{selectedWord.meaning}</p>
                  </div>
                  <div>
                    <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">English</p>
                    <p className="text-blue-600 text-xl font-bold italic border-l-4 border-blue-200 pl-3">{selectedWord.english}</p>
                  </div>
                  {selectedWord.example && (
                    <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                      <p className="text-emerald-500 text-[10px] font-black uppercase tracking-widest mb-1">例句 (Example)</p>
                      <p className="text-slate-700 text-lg font-medium leading-snug">{selectedWord.example}</p>
                    </div>
                  )}
                  <button 
                    onClick={() => setSelectedWord(null)}
                    className="w-full bg-slate-800 text-white font-black py-5 rounded-2xl text-xl shadow-lg hover:bg-slate-900 active:scale-95 transition-all mt-2"
                  >
                    知道了！
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 新增：小测验弹窗 */}
          {showQuiz && currentSection && currentSection.quiz && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
              <div className="bg-white rounded-[2.5rem] w-full max-w-md overflow-hidden shadow-2xl transform animate-in zoom-in duration-200 border-4 border-emerald-400">
                <div className="bg-emerald-500 p-6 text-white text-center">
                  <div className="inline-block bg-white/20 p-3 rounded-full mb-2">
                    <span className="text-3xl">✍️</span>
                  </div>
                  <h3 className="text-2xl font-black">过关小测验</h3>
                  <p className="text-emerald-100 text-sm mt-1">答对这道题，才能返回主页哦！</p>
                </div>
                
                <div className="p-8 space-y-6">
                  <p className="text-slate-800 text-xl font-bold leading-relaxed">
                    {currentSection.quiz.question}
                  </p>
                  
                  <div>
                    <input 
                      type="text" 
                      placeholder="请在这里输入答案..."
                      value={quizInput}
                      onChange={(e) => {
                        setQuizInput(e.target.value);
                        setQuizError(false); // 重新输入时清除错误
                      }}
                      onKeyPress={handleQuizKeyPress}
                      className={`w-full px-5 py-4 rounded-2xl border-2 text-lg font-bold focus:outline-none transition-colors ${
                        quizError ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-200 bg-slate-50 focus:border-emerald-500 focus:bg-white text-slate-800'
                      }`}
                      autoFocus
                    />
                    {quizError && (
                      <p className="text-red-500 text-sm font-bold mt-2 flex items-center gap-1 animate-in slide-in-from-top-1">
                        ❌ 回答不正确，请关掉弹窗再复习一下！
                      </p>
                    )}
                  </div>

                  <div className="flex gap-3 pt-2">
                    <button 
                      onClick={() => setShowQuiz(false)}
                      className="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-colors"
                    >
                      继续学习
                    </button>
                    <button 
                      onClick={handleQuizSubmit}
                      className="flex-1 bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-emerald-600 hover:-translate-y-1 active:translate-y-0 transition-all"
                    >
                      提交答案
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // 渲染 React 应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
